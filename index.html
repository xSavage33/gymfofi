<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plan Gluteo + Definicion - Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0f;
  --surface: #12121a;
  --surface2: #1a1a26;
  --accent-a: #ff2d55;
  --accent-a-glow: rgba(255, 45, 85, 0.3);
  --accent-b: #00d4ff;
  --accent-b-glow: rgba(0, 212, 255, 0.3);
  --text: #e8e8ed;
  --text-dim: #6b6b7b;
  --text-mid: #9b9bab;
  --border: #2a2a3a;
  --green: #34c759;
  --orange: #ff9500;
  --yellow: #ffcc00;
  --rest-day: #8e8e93;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}
.noise {
  position: fixed;
  top: 0; left: 0; width: 100%; height: 100%;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 0;
}
.glow-orb {
  position: fixed;
  width: 600px;
  height: 600px;
  border-radius: 50%;
  filter: blur(120px);
  opacity: 0.08;
  pointer-events: none;
  z-index: 0;
  transition: all 1s ease;
}
.glow-orb.a { background: var(--accent-a); top: -200px; right: -200px; }
.glow-orb.b { background: var(--accent-b); bottom: -200px; left: -200px; }
.container {
  position: relative;
  z-index: 1;
  max-width: 800px;
  margin: 0 auto;
  padding: 24px 20px 60px;
}
.header { text-align: center; margin-bottom: 28px; animation: fadeDown 0.6s ease; }
.header-label {
  font-family: 'Space Mono', monospace;
  font-size: 11px;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: var(--text-dim);
  margin-bottom: 8px;
}
.header h1 {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 52px;
  letter-spacing: 3px;
  line-height: 1;
  margin-bottom: 4px;
}
.header h1 .push { color: var(--accent-a); }
.header h1 .pull { color: var(--accent-b); }
.header h1 .legs { color: var(--green); }
.header h1 .slash { color: var(--text-dim); }
.status-bar {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 12px;
  margin-bottom: 24px;
  animation: fadeUp 0.5s ease 0.1s both;
}
.status-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 14px;
  text-align: center;
  transition: transform 0.2s ease, border-color 0.3s ease;
}
.status-card:hover { transform: translateY(-2px); }
.status-card .label {
  font-family: 'Space Mono', monospace;
  font-size: 9px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--text-dim);
  margin-bottom: 6px;
}
.status-card .value {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 26px;
  letter-spacing: 1px;
}
.status-card.bloque-a .value { color: var(--accent-a); }
.status-card.bloque-b .value { color: var(--accent-b); }
.status-card.rest .value { color: var(--rest-day); }
.block-banner {
  border-radius: 14px;
  padding: 18px 22px;
  margin-bottom: 22px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  animation: fadeUp 0.5s ease 0.2s both;
  position: relative;
  overflow: hidden;
  cursor: pointer;
  transition: transform 0.2s ease, filter 0.2s ease;
  user-select: none;
}
.block-banner:hover {
  filter: brightness(1.15);
  transform: translateY(-1px);
}
.block-banner:active {
  transform: translateY(0);
}
.override-tag {
  display: inline-block;
  font-family: 'Space Mono', monospace;
  font-size: 9px;
  letter-spacing: 1px;
  padding: 3px 8px;
  border-radius: 4px;
  margin-left: 8px;
  background: rgba(255,204,0,0.15);
  color: var(--yellow);
  border: 1px solid rgba(255,204,0,0.4);
  font-weight: normal;
  text-transform: none;
  vertical-align: middle;
}
.override-tag-hint {
  display: inline-block;
  font-family: 'Space Mono', monospace;
  font-size: 9px;
  letter-spacing: 1px;
  margin-left: 8px;
  color: var(--text-dim);
  font-weight: normal;
  text-transform: none;
  vertical-align: middle;
  opacity: 0.5;
}
.block-banner::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  opacity: 0.06;
  background: repeating-linear-gradient(45deg, transparent, transparent 10px, currentColor 10px, currentColor 11px);
}
.block-banner.bloque-a {
  background: linear-gradient(135deg, rgba(255,45,85,0.12), rgba(255,45,85,0.04));
  border: 1px solid rgba(255,45,85,0.25);
  color: var(--accent-a);
}
.block-banner.bloque-b {
  background: linear-gradient(135deg, rgba(0,212,255,0.12), rgba(0,212,255,0.04));
  border: 1px solid rgba(0,212,255,0.25);
  color: var(--accent-b);
}
.block-banner.rest-day {
  background: linear-gradient(135deg, rgba(142,142,147,0.12), rgba(142,142,147,0.04));
  border: 1px solid rgba(142,142,147,0.25);
  color: var(--rest-day);
}
.block-banner .block-name {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 30px;
  letter-spacing: 2px;
  position: relative;
}
.block-banner .block-week {
  font-family: 'Space Mono', monospace;
  font-size: 11px;
  letter-spacing: 1px;
  opacity: 0.8;
  position: relative;
  text-align: right;
}
.day-type-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 10px 20px;
  border-radius: 100px;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 22px;
  letter-spacing: 2px;
  margin-bottom: 20px;
  animation: fadeUp 0.5s ease 0.3s both;
}
.day-type-badge.leg1 { background: rgba(255,45,85,0.12); border: 1px solid rgba(255,45,85,0.3); color: var(--accent-a); }
.day-type-badge.upper1 { background: rgba(0,212,255,0.12); border: 1px solid rgba(0,212,255,0.3); color: var(--accent-b); }
.day-type-badge.leg2 { background: rgba(52,199,89,0.12); border: 1px solid rgba(52,199,89,0.3); color: var(--green); }
.day-type-badge.upper2 { background: rgba(255,149,0,0.12); border: 1px solid rgba(255,149,0,0.3); color: var(--orange); }
.day-type-badge.leg3 { background: rgba(255,204,0,0.12); border: 1px solid rgba(255,204,0,0.3); color: var(--yellow); }
.day-type-badge.rest { background: rgba(142,142,147,0.12); border: 1px solid rgba(142,142,147,0.25); color: var(--rest-day); }
.day-type-badge .dot { width: 8px; height: 8px; border-radius: 50%; background: currentColor; animation: pulse 2s ease infinite; }
.muscle-group { margin-bottom: 18px; animation: fadeUp 0.5s ease both; }
.muscle-group-header {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 10px; padding-bottom: 8px;
  border-bottom: 1px solid var(--border);
}
.muscle-group-header h3 {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 20px; letter-spacing: 2px; color: var(--text);
}
.muscle-group-header .count {
  font-family: 'Space Mono', monospace;
  font-size: 10px; color: var(--text-dim);
  background: var(--surface2); padding: 3px 8px; border-radius: 4px;
}
.exercise-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  margin-bottom: 8px;
  overflow: hidden;
  transition: border-color 0.3s ease;
}
.exercise-card:hover { border-color: var(--text-dim); }
.exercise-main {
  padding: 14px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  cursor: pointer;
  gap: 12px;
}
.exercise-left { flex: 1; min-width: 0; }
.exercise-number {
  font-family: 'Space Mono', monospace;
  font-size: 10px; color: var(--text-dim); margin-bottom: 2px;
}
.exercise-name { font-weight: 600; font-size: 14px; color: var(--text); margin-bottom: 3px; }
.exercise-emphasis { font-size: 12px; color: var(--text-mid); }
.exercise-stats { display: flex; gap: 6px; flex-shrink: 0; flex-wrap: wrap; justify-content: flex-end; }
.stat-pill {
  font-family: 'Space Mono', monospace;
  font-size: 10px;
  padding: 4px 8px;
  border-radius: 6px;
  background: var(--surface2);
  color: var(--text-mid);
  white-space: nowrap;
}
.stat-pill.kcal-pill {
  background: rgba(52,199,89,0.12);
  color: var(--green);
  border: 1px solid rgba(52,199,89,0.25);
}
.exercise-type-tag {
  display: inline-block;
  font-family: 'Space Mono', monospace;
  font-size: 8px;
  letter-spacing: 1.5px;
  padding: 3px 7px;
  border-radius: 4px;
  margin-bottom: 4px;
  text-transform: uppercase;
  font-weight: 700;
}
.exercise-type-tag.compound {
  background: rgba(255,45,85,0.1);
  color: var(--accent-a);
  border: 1px solid rgba(255,45,85,0.3);
}
.exercise-type-tag.isolation {
  background: rgba(0,212,255,0.1);
  color: var(--accent-b);
  border: 1px solid rgba(0,212,255,0.3);
}
.expand-arrow {
  color: var(--text-dim);
  font-size: 12px;
  transition: transform 0.3s ease;
  flex-shrink: 0;
}
.exercise-card.open .expand-arrow { transform: rotate(180deg); }
.exercise-detail {
  display: none;
  padding: 0 16px 14px;
  border-top: 1px solid var(--border);
}
.exercise-card.open .exercise-detail { display: block; }
.detail-section {
  margin-top: 12px;
}
.detail-label {
  font-family: 'Space Mono', monospace;
  font-size: 9px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--text-dim);
  margin-bottom: 8px;
}
.alt-item {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 0;
  border-bottom: 1px solid rgba(42,42,58,0.5);
}
.alt-item:last-child { border-bottom: none; }
.alt-bullet { width: 6px; height: 6px; border-radius: 50%; background: var(--text-dim); flex-shrink: 0; }
.alt-name { font-size: 13px; color: var(--text-mid); }

/* Kcal calculator */
.kcal-top-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-top: 8px;
}
.kcal-input-wrap {
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.kcal-input-wrap label {
  font-family: 'Space Mono', monospace;
  font-size: 9px;
  letter-spacing: 1px;
  color: var(--text-dim);
  text-transform: uppercase;
}
.kcal-input-wrap input {
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text);
  font-family: 'Space Mono', monospace;
  font-size: 13px;
  padding: 8px 10px;
  border-radius: 6px;
  outline: none;
  transition: border-color 0.2s ease;
  width: 100%;
}
.kcal-input-wrap input:focus { border-color: var(--green); }

.sets-table {
  margin-top: 12px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
}
.sets-table-header {
  display: grid;
  grid-template-columns: 60px 1fr 90px;
  gap: 8px;
  padding: 8px 12px;
  background: rgba(255,255,255,0.02);
  border-bottom: 1px solid var(--border);
}
.sets-table-header span {
  font-family: 'Space Mono', monospace;
  font-size: 9px;
  letter-spacing: 1.5px;
  color: var(--text-dim);
  text-transform: uppercase;
}
.set-row {
  display: grid;
  grid-template-columns: 60px 1fr 90px;
  gap: 8px;
  padding: 6px 12px;
  align-items: center;
  border-bottom: 1px solid rgba(42,42,58,0.4);
}
.set-row:last-child { border-bottom: none; }
.set-row .set-num {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 18px;
  letter-spacing: 1px;
  color: var(--text-mid);
}
.set-row input {
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text);
  font-family: 'Space Mono', monospace;
  font-size: 13px;
  padding: 6px 10px;
  border-radius: 5px;
  outline: none;
  width: 100%;
  transition: border-color 0.2s ease;
}
.set-row input:focus { border-color: var(--green); }
.set-row input.in-range { border-color: rgba(52,199,89,0.5); }
.set-row input.out-low { border-color: rgba(255,149,0,0.5); }
.set-row input.out-high { border-color: rgba(0,212,255,0.5); }
.set-status {
  font-family: 'Space Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.5px;
  text-align: center;
  padding: 4px 6px;
  border-radius: 4px;
  white-space: nowrap;
}
.set-status.empty { color: var(--text-dim); background: transparent; }
.set-status.in-range { color: var(--green); background: rgba(52,199,89,0.08); }
.set-status.out-low { color: var(--orange); background: rgba(255,149,0,0.08); }
.set-status.out-high { color: var(--accent-b); background: rgba(0,212,255,0.08); }
.kcal-result {
  margin-top: 10px;
  padding: 10px 12px;
  background: rgba(52,199,89,0.08);
  border: 1px solid rgba(52,199,89,0.25);
  border-radius: 8px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.kcal-result-label {
  font-family: 'Space Mono', monospace;
  font-size: 10px;
  letter-spacing: 1px;
  color: var(--text-mid);
  text-transform: uppercase;
}
.kcal-result-value {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 22px;
  letter-spacing: 1px;
  color: var(--green);
}

/* Session summary */
.session-summary {
  margin-top: 24px;
  padding: 20px;
  background: linear-gradient(135deg, rgba(52,199,89,0.08), rgba(52,199,89,0.02));
  border: 1px solid rgba(52,199,89,0.25);
  border-radius: 14px;
  animation: fadeUp 0.5s ease 0.5s both;
}
.session-summary-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 12px;
}
.session-summary-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 22px;
  letter-spacing: 2px;
  color: var(--green);
}
.session-summary-total {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 36px;
  letter-spacing: 1px;
  color: var(--green);
}
.session-summary-total .unit {
  font-family: 'Space Mono', monospace;
  font-size: 11px;
  letter-spacing: 2px;
  color: var(--text-mid);
  margin-left: 4px;
}
.session-summary-detail {
  font-family: 'Space Mono', monospace;
  font-size: 11px;
  color: var(--text-dim);
  line-height: 1.6;
}

.rest-message {
  text-align: center;
  padding: 60px 20px;
  animation: fadeUp 0.6s ease 0.3s both;
}
.rest-icon { font-size: 64px; margin-bottom: 16px; opacity: 0.6; }
.rest-message h2 {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 36px;
  letter-spacing: 2px;
  color: var(--rest-day);
  margin-bottom: 8px;
}
.rest-message p {
  color: var(--text-dim);
  font-size: 14px;
  line-height: 1.6;
  max-width: 400px;
  margin: 0 auto;
}
.day-strip {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 6px;
  margin-bottom: 24px;
  animation: fadeUp 0.5s ease 0.2s both;
}
.day-cell {
  text-align: center;
  padding: 10px 4px;
  border-radius: 10px;
  cursor: pointer;
  transition: all 0.3s ease;
  background: var(--surface);
  border: 1px solid var(--border);
}
.day-cell:hover { border-color: var(--text-dim); }
.day-cell .day-name {
  font-family: 'Space Mono', monospace;
  font-size: 9px;
  letter-spacing: 1px;
  color: var(--text-dim);
  margin-bottom: 4px;
  text-transform: uppercase;
}
.day-cell .day-num {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 22px;
  color: var(--text-mid);
  margin-bottom: 2px;
}
.day-cell .day-type { font-size: 8px; font-weight: 600; letter-spacing: 0.5px; }
.day-cell.leg1 .day-type { color: var(--accent-a); }
.day-cell.upper1 .day-type { color: var(--accent-b); }
.day-cell.leg2 .day-type { color: var(--green); }
.day-cell.upper2 .day-type { color: var(--orange); }
.day-cell.leg3 .day-type { color: var(--yellow); }
.day-cell.rest .day-type { color: var(--rest-day); }
.day-cell.active { border-width: 2px; }
.day-cell.active.leg1 { border-color: var(--accent-a); background: rgba(255,45,85,0.06); }
.day-cell.active.upper1 { border-color: var(--accent-b); background: rgba(0,212,255,0.06); }
.day-cell.active.leg2 { border-color: var(--green); background: rgba(52,199,89,0.06); }
.day-cell.active.upper2 { border-color: var(--orange); background: rgba(255,149,0,0.06); }
.day-cell.active.leg3 { border-color: var(--yellow); background: rgba(255,204,0,0.06); }
.day-cell.active.rest { border-color: var(--rest-day); background: rgba(142,142,147,0.06); }
.day-cell.today { position: relative; }
.day-cell.today::before {
  content: 'HOY';
  position: absolute;
  top: -8px; left: 50%;
  transform: translateX(-50%);
  font-family: 'Space Mono', monospace;
  font-size: 7px;
  letter-spacing: 1px;
  color: var(--green);
  background: var(--bg);
  padding: 0 4px;
}
.notes-section {
  margin-top: 28px;
  padding: 20px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  animation: fadeUp 0.5s ease 0.5s both;
}
.notes-section h4 {
  font-family: 'Space Mono', monospace;
  font-size: 10px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--text-dim);
  margin-bottom: 10px;
}
.notes-section p {
  font-size: 13px;
  color: var(--text-mid);
  line-height: 1.6;
  margin-bottom: 6px;
}
.profile-bar {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 14px 18px;
  margin-bottom: 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  flex-wrap: wrap;
  animation: fadeUp 0.5s ease 0.05s both;
}
.profile-bar .profile-label {
  font-family: 'Space Mono', monospace;
  font-size: 10px;
  letter-spacing: 2px;
  color: var(--text-dim);
  text-transform: uppercase;
}
.profile-bar .profile-data {
  font-family: 'Space Mono', monospace;
  font-size: 12px;
  color: var(--text-mid);
}
.profile-bar button {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text-mid);
  font-family: 'Space Mono', monospace;
  font-size: 10px;
  letter-spacing: 1px;
  padding: 6px 12px;
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.2s ease;
}
.profile-bar button:hover { border-color: var(--green); color: var(--green); }
.modal-bg {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.7);
  z-index: 100;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.modal-bg.open { display: flex; }
.modal {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 24px;
  max-width: 400px;
  width: 100%;
}
.modal h3 {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 22px;
  letter-spacing: 2px;
  margin-bottom: 16px;
  color: var(--text);
}
.modal .field {
  margin-bottom: 12px;
}
.modal label {
  display: block;
  font-family: 'Space Mono', monospace;
  font-size: 9px;
  letter-spacing: 1px;
  color: var(--text-dim);
  text-transform: uppercase;
  margin-bottom: 5px;
}
.modal input {
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text);
  font-family: 'Space Mono', monospace;
  font-size: 13px;
  padding: 8px 10px;
  border-radius: 6px;
  width: 100%;
  outline: none;
}
.modal input[type="date"] {
  color-scheme: dark;
}
.modal select {
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text);
  font-family: 'Space Mono', monospace;
  font-size: 13px;

  if (profile && profile.startDate) {
    const parts = profile.startDate.split("-");
    if (parts.length === 3) {
      return new Date(parseInt(parts[0]), parseInt(parts[1]) - 1, parseInt(parts[2]));

  }
  return new Date(2026, 3, 6);
}

// Index: 0=Lun, 1=Mar, 2=Mie, 3=Jue, 4=Vie, 5=Sab, 6=Dom
const WEEKLY_SCHEDULE = {
  0: "leg1",   // Lunes - Gluteo + posterior
  1: "upper1", // Martes - Espalda + brazos
  2: "leg2",   // Miercoles - Cuadriceps + gluteo
  3: "upper2", // Jueves - Hombros + pecho + brazos
  4: "leg3",   // Viernes - Aductores + femoral + gluteo medio
  5: "rest",   // Sabado
  6: "rest"    // Domingo
};

const DAY_LABELS = { leg1: "PIERNA 1", upper1: "UPPER 1", leg2: "PIERNA 2", upper2: "UPPER 2", leg3: "PIERNA 3", rest: "DESCANSO" };
const DAY_LABELS_LONG = { leg1: "PIERNA 1 - GLUTEO + POSTERIOR", upper1: "UPPER 1 - ESPALDA + BRAZOS", leg2: "PIERNA 2 - CUADRICEPS + GLUTEO", upper2: "UPPER 2 - HOMBROS + PECHO + BRAZOS", leg3: "PIERNA 3 - ADUCTORES + GLUTEO MEDIO", rest: "DIA DE DESCANSO" };

const DAY_NAMES_FULL = ["Domingo", "Lunes", "Martes", "Miercoles", "Jueves", "Viernes", "Sabado"];
const MONTH_NAMES = ["Ene", "Feb", "Mar", "Abr", "May", "Jun", "Jul", "Ago", "Sep", "Oct", "Nov", "Dic"];

function getMondayIndex(date) {
  // 0=Lun, 6=Dom
  return (date.getDay() + 6) % 7;
}

function getDaysSinceStart(date) {
  const startDate = getStartDate();
  const d = new Date(date.getFullYear(), date.getMonth(), date.getDate());
  const s = new Date(startDate.getFullYear(), startDate.getMonth(), startDate.getDate());
  return Math.floor((d - s) / (1000 * 60 * 60 * 24));
}

function getBlock(date) {
  const days = getDaysSinceStart(date);
  let blockIndex, weekInBlock;
  if (days < 0) {
    blockIndex = 0;
    weekInBlock = 1;
  } else {
    blockIndex = Math.floor(days / 28);
    const dayInBlock = days % 28;
    weekInBlock = Math.floor(dayInBlock / 7) + 1;
  }
  const autoBlock = blockIndex % 2 === 0 ? "a" : "b";
  // Si hay override manual, usamos ese
  const block = blockOverride || autoBlock;
  return { block, weekInBlock, blockIndex, autoBlock, overridden: blockOverride !== null };
}

function getDayType(date) {
  return WEEKLY_SCHEDULE[getMondayIndex(date)];
}

function getWeekDates(date) {
  const d = new Date(date);
  const monday = new Date(d);
  monday.setDate(d.getDate() - getMondayIndex(d));
  const dates = [];
  for (let i = 0; i < 7; i++) {
    const dd = new Date(monday);
    dd.setDate(monday.getDate() + i);
    dates.push(dd);
  }
  return dates;
}

function isSameDay(a, b) {
  return a.getFullYear() === b.getFullYear() && a.getMonth() === b.getMonth() && a.getDate() === b.getDate();
}

// =============================================================
// KCAL CALCULATION
// =============================================================
// Calcula kcal basado en trabajo mecanico real + factor eficiencia + EPOC estimado
// Formula: Trabajo (J) = Peso_efectivo (kg) * 9.81 * ROM (m) * Reps * Series
// kcal_agudo = Trabajo / (4184 * eficiencia)
// kcal_descanso = tiempo_descanso_min * 1.5 (gasto basal sentado)
// kcal_EPOC = kcal_agudo * factor_EPOC (mayor en compuestos pesados)

function calculateKcal(weight, repsPerSet, restSecOverride, exercise, profile) {
  // repsPerSet: array con las reps de cada serie. Si una serie tiene 0 o vacio, no cuenta.
  if (!weight || weight <= 0 || !repsPerSet || repsPerSet.length === 0) return null;

  const validReps = repsPerSet.map(r => parseFloat(r) || 0).filter(r => r > 0);
  if (validReps.length === 0) return null;

  const bodyWeight = profile.weight || 85;
  const eff = 0.22;
  const g = 9.81;
  const rom = exercise.rom || 0.4;
  const bwFactor = exercise.bwFactor || 0;

  const effectiveWeight = weight + (bodyWeight * bwFactor);
  const isUnilateral = exercise.setsLabel.includes("/");
  const unilateralMult = isUnilateral ? 2 : 1;

  // suma de reps reales de todas las series con datos
  const totalReps = validReps.reduce((a, b) => a + b, 0) * unilateralMult;
  const actualSets = validReps.length;

  // Trabajo mecanico
  const workJoules = effectiveWeight * g * rom * totalReps * 1.3;
  const kcalWork = workJoules / (4184 * eff);

  // EPOC segun tipo
  let epocFactor = 1.4;
  if (exercise.type === "compound-lower") epocFactor = 1.7;
  else if (exercise.type === "compound-upper") epocFactor = 1.55;
  else if (exercise.type === "isolation") epocFactor = 1.25;

  // Descansos: solo entre series con datos (n-1 descansos)
  const restSec = (restSecOverride && restSecOverride > 0) ? restSecOverride : parseRestTime(exercise.rest);
  const restMinTotal = (restSec * (actualSets - 1)) / 60;
  let kcalPerMinRest;
  if (restSec <= 60) kcalPerMinRest = 3.0;
  else if (restSec <= 120) kcalPerMinRest = 2.3;
  else if (restSec <= 180) kcalPerMinRest = 1.9;
  else kcalPerMinRest = 1.6;
  const restKcal = restMinTotal * kcalPerMinRest;

  const total = (kcalWork * epocFactor) + restKcal;

  return {
    work: kcalWork,
    rest: restKcal,
    restSecUsed: restSec,
    epocFactor,
    totalReps,
    actualSets,
    total: Math.round(total)
  };
}

function parseRestTime(restStr) {
  // "2-3 min" -> 150s, "60s" -> 60, "60-90s" -> 75, "90s" -> 90
  if (!restStr) return 90;
  if (restStr.includes("min")) {
    const nums = restStr.match(/\d+/g);
    if (!nums) return 120;
    if (nums.length === 2) return ((parseInt(nums[0]) + parseInt(nums[1])) / 2) * 60;
    return parseInt(nums[0]) * 60;
  }
  const nums = restStr.match(/\d+/g);
  if (!nums) return 60;
  if (nums.length === 2) return (parseInt(nums[0]) + parseInt(nums[1])) / 2;
  return parseInt(nums[0]);
}

function parseRepsRange(setsLabel) {
  // "4x6-8" -> {min:6, max:8}, "3x8-10" -> {min:8, max:10}, "4x10-12" -> {min:10, max:12}
  // "3x10-12/pierna" -> {min:10, max:12} (la barra invertida se ignora)
  if (!setsLabel) return { min: 8, max: 12 };
  const part = setsLabel.split("/")[0]; // tomar antes del slash
  const match = part.match(/x\s*(\d+)\s*-\s*(\d+)/i);
  if (match) {
    return { min: parseInt(match[1]), max: parseInt(match[2]) };
  }
  // Caso "4x8" sin rango
  const single = part.match(/x\s*(\d+)/i);
  if (single) {
    const n = parseInt(single[1]);
    return { min: n, max: n };
  }
  return { min: 8, max: 12 };
}

function getRepStatus(reps, range) {
  if (!reps || reps === "") return { cls: "empty", txt: "" };
  const r = parseFloat(reps);
  if (isNaN(r) || r === 0) return { cls: "empty", txt: "" };
  if (r < range.min) return { cls: "out-low", txt: `Bajo (min ${range.min})` };
  if (r > range.max) return { cls: "out-high", txt: `Alto (max ${range.max})` };
  if (r === range.max) return { cls: "in-range", txt: "Tope" };
  return { cls: "in-range", txt: "En rango" };
}

// =============================================================
// CALCULO DE METRICAS CALORICAS (TMB, TDEE, objetivos)
// =============================================================
// TMB con formula Mifflin-St Jeor (la mas precisa para poblacion general).
// Asume sexo masculino. Si en el futuro se agrega sexo al perfil, ajustar.
// Hombre: (10*peso) + (6.25*altura) - (5*edad) + 5
// Mujer:  (10*peso) + (6.25*altura) - (5*edad) - 161

function calculateTMB(profile) {
  const w = parseFloat(profile.weight) || 80;
  const h = parseFloat(profile.height) || 169;
  const a = parseFloat(profile.age) || 20;
  // Mujer: -161 al final (vs +5 hombre)
  return Math.round((10 * w) + (6.25 * h) - (5 * a) - 161);
}

// TMB con formula Harris-Benedict (la alternativa clasica)
function calculateTMB_HB(profile) {
  const w = parseFloat(profile.weight) || 80;
  const h = parseFloat(profile.height) || 169;
  const a = parseFloat(profile.age) || 20;
  // Mujer: 447.6 + (9.2*w) + (3.1*h) - (4.3*a)
  return Math.round(447.6 + (9.247 * w) + (3.098 * h) - (4.33 * a));
}

const ACTIVITY_MULTIPLIERS = {
  sedentary: { factor: 1.2,   label: "Sedentario", desc: "Oficina, poco movimiento" },
  light:     { factor: 1.375, label: "Ligero",     desc: "Ejercicio 1-3 dias/sem" },
  moderate:  { factor: 1.55,  label: "Moderado",   desc: "Ejercicio 3-5 dias/sem" },
  high:      { factor: 1.725, label: "Alto",       desc: "Ejercicio 6-7 dias/sem" },
  veryhigh:  { factor: 1.9,   label: "Muy alto",   desc: "Trabajo fisico + ejercicio" }
};

function calculateTDEE(profile) {
  const tmb = calculateTMB(profile);
  const lvl = ACTIVITY_MULTIPLIERS[profile.activityLevel] || ACTIVITY_MULTIPLIERS.moderate;
  return Math.round(tmb * lvl.factor);
}

function calculateGoals(profile) {
  const tdee = calculateTDEE(profile);
  return {
    deficitAggressive: Math.round(tdee - 750),  // perdida ~0.75 kg/sem (no recomendado largo plazo)
    deficitModerate:   Math.round(tdee - 500),  // perdida ~0.5 kg/sem
    deficitMild:       Math.round(tdee - 300),  // perdida ~0.3 kg/sem (recomp)
    maintenance:       tdee,
    surplusMild:       Math.round(tdee + 250),  // ganancia limpia (lean bulk)
    surplusModerate:   Math.round(tdee + 500),  // ganancia clasica
  };
}

function getWeekTrainRestCounts() {
  let train = 0, rest = 0;
  for (let i = 0; i < 7; i++) {
    if (WEEKLY_SCHEDULE[i] === "rest") rest++;
    else train++;
  }
  return { train, rest };
}

function calculateMacros(kcal, weight) {
  // Proteina: 2 g/kg (en deficit) o 1.6-1.8 g/kg (mantenimiento/superavit)
  // Aqui usamos 2 g/kg como referencia conservadora (segura siempre)
  const protein = Math.round(weight * 2);
  const proteinKcal = protein * 4;
  // Grasa: 25-30% de las kcal totales (0.8-1 g/kg minimo)
  const fatKcal = Math.round(kcal * 0.27);
  const fat = Math.round(fatKcal / 9);
  // Carbos: el resto
  const carbsKcal = kcal - proteinKcal - fatKcal;
  const carbs = Math.round(carbsKcal / 4);
  return { protein, fat, carbs };
}

// Calcula macros ciclados: entreno (5 dias) vs descanso (2 dias)
// Mantiene el promedio semanal igual al objetivo.
// Sube kcal en dias de entreno y baja en descanso, solo via carbos.
function calculateCycledMacros(targetKcal, weight, trainDays, restDays) {
  // Diferencia entre entreno y descanso: ~450 kcal aprox (110g carbos)
  // Repartir para mantener promedio semanal:
  // weekTotal = targetKcal * 7
  // weekTotal = trainKcal * trainDays + restKcal * restDays
  // restKcal = trainKcal - 450
  // => trainKcal * (trainDays + restDays) - 450 * restDays = targetKcal * 7
  // => trainKcal = (targetKcal * 7 + 450 * restDays) / 7
  const diff = 450;
  const totalDays = trainDays + restDays;
  const trainKcal = Math.round((targetKcal * totalDays + diff * restDays) / totalDays);
  const restKcal = trainKcal - diff;

  // Proteina y grasa fijas (basadas en promedio, iguales ambos dias)
  const protein = Math.round(weight * 2);
  const proteinKcal = protein * 4;
  const fatKcal = Math.round(targetKcal * 0.27);
  const fat = Math.round(fatKcal / 9);

  // Carbos varian
  const trainCarbsKcal = trainKcal - proteinKcal - fatKcal;
  const restCarbsKcal = restKcal - proteinKcal - fatKcal;
  const trainCarbs = Math.round(trainCarbsKcal / 4);
  const restCarbs = Math.round(restCarbsKcal / 4);

  return {
    train: { kcal: trainKcal, protein, fat, carbs: trainCarbs },
    rest:  { kcal: restKcal,  protein, fat, carbs: restCarbs }
  };
}

  const badgeClass = dayType;
  html += `
    <div class="day-type-badge ${badgeClass}">
      <span class="dot"></span>
      ${DAY_LABELS_LONG[dayType]}
    </div>
  `;

  // Content
  if (dayType === "rest") {
    html += `
      <div class="rest-message">
        <div class="rest-icon">&#9790;</div>
        <h2>Dia de descanso total</h2>
        <p>Recuperacion activa: camina 30 minutos, estira, hidratate bien y duerme 7-8 horas. Tu cuerpo crece cuando descansa.</p>
      </div>
    `;
  } else {
    const dayData = blockData[dayType];
    let exerciseNum = 1;
    let sessionTotalKcal = 0;
    let sessionExercisesWithData = 0;

    dayData.forEach((group, gi) => {
      html += `
        <div class="muscle-group" style="animation-delay: ${0.3 + gi * 0.08}s">
          <div class="muscle-group-header">
            <h3>${group.muscle}</h3>
            <span class="count">${group.exercises.length} ejercicio${group.exercises.length > 1 ? "s" : ""}</span>
          </div>
      `;
      group.exercises.forEach((ex, ei) => {
        const exId = `${dayType}-${gi}-${ei}`;
        const cardId = `card-${gi}-${ei}`;
        const log = getLog(selectedDate, exId);
        // Asegurar que setReps tiene tamano correcto (igual al numero de series del plan)
        const setRepsArr = [];
        for (let i = 0; i < ex.sets; i++) {
          setRepsArr.push((log.setReps && log.setReps[i] !== undefined) ? log.setReps[i] : "");
        }
        const kcalResult = calculateKcal(
          parseFloat(log.weight) || 0,
          setRepsArr,
          parseFloat(log.restSec) || 0,
          ex,
          profile
        );
        const kcalDisplay = (kcalResult && log.weight) ? kcalResult.total : null;
        if (kcalDisplay) {
          sessionTotalKcal += kcalDisplay;
          sessionExercisesWithData++;
        }

        html += `
          <div class="exercise-card" id="${cardId}" data-exid="${exId}">
            <div class="exercise-main" onclick="toggleCard('${cardId}')">
              <div class="exercise-left">
                <span class="exercise-type-tag ${ex.type === 'isolation' ? 'isolation' : 'compound'}">${ex.type === 'isolation' ? 'AISLAMIENTO' : 'COMPUESTO'}</span>
                <div class="exercise-number">EJERCICIO ${exerciseNum}</div>
                <div class="exercise-name">${ex.name}</div>
                <div class="exercise-emphasis">${ex.emphasis}</div>
              </div>
              <div class="exercise-stats">
                <span class="stat-pill">${ex.setsLabel}</span>
                <span class="stat-pill">${ex.rest}</span>
                ${kcalDisplay ? `<span class="stat-pill kcal-pill">${kcalDisplay} kcal</span>` : ""}
              </div>
              <span class="expand-arrow">&#9662;</span>
            </div>
            <div class="exercise-detail" data-exid="${exId}">
              <div class="detail-section">
                <div class="detail-label">Registrar sesion (calcula kcal)</div>
                <div class="kcal-top-row">
                  <div class="kcal-input-wrap">
                    <label>Peso (kg) - incluye barra</label>
                    <input type="number" step="0.5" value="${log.weight}" oninput="updateLog('${exId}', 'weight', this.value)" placeholder="0">
                  </div>
                  <div class="kcal-input-wrap">
                    <label>Descanso (s)</label>
                    <input type="number" value="${log.restSec || parseRestTime(ex.rest)}" oninput="updateLog('${exId}', 'restSec', this.value)" placeholder="${parseRestTime(ex.rest)}">
                  </div>
                </div>
                <div class="sets-table" data-exid="${exId}">
                  <div class="sets-table-header">
                    <span>Serie</span>
                    <span>Reps (rango ${parseRepsRange(ex.setsLabel).min}-${parseRepsRange(ex.setsLabel).max})</span>
                    <span>Estado</span>
                  </div>
                  ${setRepsArr.map((rep, idx) => {
                    const range = parseRepsRange(ex.setsLabel);
                    const status = getRepStatus(rep, range);
                    return `
                      <div class="set-row">
                        <div class="set-num">#${idx + 1}</div>
                        <input type="number" value="${rep}" min="0" oninput="updateSetReps('${exId}', ${idx}, this.value)" placeholder="0" class="${status.cls === 'empty' ? '' : status.cls}" data-exid="${exId}" data-setidx="${idx}" data-min="${range.min}" data-max="${range.max}">
                        <div class="set-status ${status.cls}" data-exid="${exId}" data-setidx="${idx}">${status.txt}</div>
                      </div>
                    `;
                  }).join("")}
                </div>
                ${kcalDisplay ? `
                  <div class="kcal-result" data-exid="${exId}">
                    <div>
                      <div class="kcal-result-label">Gasto estimado</div>
                      <div style="font-family: 'Space Mono', monospace; font-size: 10px; color: var(--text-dim); margin-top: 2px;">
                        ${kcalResult.actualSets} series, ${kcalResult.totalReps} reps totales &middot; descanso ${kcalResult.restSecUsed}s
                      </div>
                    </div>
                    <div class="kcal-result-value">${kcalDisplay} <span style="font-size: 12px; color: var(--text-mid);">kcal</span></div>
                  </div>
                ` : ""}
              </div>
              <div class="detail-section">
                <div class="detail-label">Alternativas (mismo enfasis)</div>
                ${ex.alts.map(a => `
                  <div class="alt-item">
                    <div class="alt-bullet"></div>
                    <div class="alt-name">${a}</div>
                  </div>
                `).join("")}
              </div>
            </div>
          </div>
        `;
        exerciseNum++;
      });
      html += "</div>";
    });

    // Session summary
    if (sessionTotalKcal > 0) {
      html += `
        <div class="session-summary">
          <div class="session-summary-header">
            <div class="session-summary-title">TOTAL SESION</div>
            <div class="session-summary-total">${sessionTotalKcal}<span class="unit">KCAL</span></div>
          </div>
          <div class="session-summary-detail">
            ${sessionExercisesWithData} de ${exerciseNum - 1} ejercicios registrados<br>
            Estimacion basada en trabajo mecanico + EPOC (eficiencia muscular 22%).<br>
            Margen de error real: aprox &plusmn;15-25%. Util como referencia comparativa entre sesiones.
          </div>
        </div>
      `;
    }
  }

  // Notes
  html += `
    <div class="notes-section">
      <h4>Recordatorios</h4>
      <p>Calentamiento: 5 min cardio + 2-3 series progresivas del primer ejercicio.</p>
      <p>Sobrecarga progresiva: intenta subir peso o reps cada semana.</p>
      <p>Cada 4 semanas cambias de bloque automaticamente.</p>
      <p>Puedes rotar entre las alternativas de cada ejercicio dentro del mismo bloque.</p>
      <p>Despues de 2 bloques (8 semanas), toma 1 semana de deload al 50-60% del peso.</p>
      <p>Los kcal se calculan con trabajo mecanico real (peso x ROM x reps) + factor EPOC. Mas preciso que METs.</p>
    </div>
  `;

  app.innerHTML = html;
}

function renderMacroBlock(label, colorClass, targetKcal, cycled) {
  return `
    <div class="macro-block ${colorClass}">
      <div class="macro-block-header">
        <span class="macro-block-name">${label}</span>
        <span class="macro-block-target">Promedio: ${targetKcal} kcal/dia</span>
      </div>
      <div class="macro-block-rows">
        <div class="macro-subrow train">
          <div class="macro-subrow-label">
            <span class="macro-subrow-tag">ENTRENO</span>
            <span class="macro-subrow-kcal">${cycled.train.kcal} kcal</span>
          </div>
          <div class="macro-row-values">
            <span><b>P</b> ${cycled.train.protein}g</span>
            <span><b>G</b> ${cycled.train.fat}g</span>
            <span><b>C</b> ${cycled.train.carbs}g</span>
          </div>
        </div>
        <div class="macro-subrow rest">
          <div class="macro-subrow-label">
            <span class="macro-subrow-tag">DESCANSO</span>
            <span class="macro-subrow-kcal">${cycled.rest.kcal} kcal</span>
          </div>
          <div class="macro-row-values">
            <span><b>P</b> ${cycled.rest.protein}g</span>
            <span><b>G</b> ${cycled.rest.fat}g</span>
            <span><b>C</b> ${cycled.rest.carbs}g</span>
          </div>
        </div>
      </div>
    </div>
  `;
}

function dayTypeColor(dt) {
  if (dt === "leg1") return "var(--accent-a)";
  if (dt === "leg2") return "var(--green)";
  if (dt === "leg3") return "var(--yellow)";
  if (dt === "upper1") return "var(--accent-b)";
  if (dt === "upper2") return "var(--orange)";
  return "var(--rest-day)";
}

function toggleCard(id) {
  document.getElementById(id).classList.toggle("open");
}

function toggleMetrics() {
  const panel = document.getElementById("metrics-panel");
  if (!panel) return;
  panel.classList.toggle("collapsed");
  try {
    localStorage.setItem("gym_metrics_collapsed_novia", panel.classList.contains("collapsed") ? "1" : "0");
  } catch(e) {}
}

function toggleBlockOverride() {
  // Logica:
  // null -> "b" si el bloque automatico es A, o "a" si el automatico es B
  // "a" -> "b"
  // "b" -> null (volver a automatico)
  const blockInfo = getBlock(selectedDate);
  if (blockOverride === null) {
    // No hay override. Saltamos al bloque opuesto del automatico
    blockOverride = blockInfo.autoBlock === "a" ? "b" : "a";
  } else if (blockOverride === blockInfo.autoBlock) {
    // El override coincide con automatico (caso raro), saltamos al otro
    blockOverride = blockOverride === "a" ? "b" : "a";
  } else {
    // Hay override distinto al automatico, volvemos a automatico (null)
    blockOverride = null;
  }
  render();
  window.scrollTo({ top: 0, behavior: "smooth" });
}

function selectDate(y, m, d) {
  selectedDate = new Date(y, m, d);
  render();
  window.scrollTo({ top: 0, behavior: "smooth" });
}

function updateLog(exId, field, value) {
  const log = getLog(selectedDate, exId);
  log[field] = value;
  setLog(selectedDate, exId, log);
  refreshExerciseKcal(exId);
}

function updateSetReps(exId, setIdx, value) {
  const log = getLog(selectedDate, exId);
  if (!Array.isArray(log.setReps)) log.setReps = [];
  log.setReps[setIdx] = value;
  setLog(selectedDate, exId, log);
  refreshExerciseKcal(exId);
  refreshSetStatus(exId, setIdx, value);
}

// Refresca solo el estado visual (color y texto) de una fila de serie sin re-renderizar todo
function refreshSetStatus(exId, setIdx, value) {
  const inputEl = document.querySelector(`input[data-exid="${exId}"][data-setidx="${setIdx}"]`);
  if (!inputEl) return;
  const statusEl = document.querySelector(`.set-status[data-exid="${exId}"][data-setidx="${setIdx}"]`);
  if (!statusEl) return;
  // Obtener el rango del input (almacenado en data-min/data-max)
  const min = parseInt(inputEl.getAttribute("data-min"));
  const max = parseInt(inputEl.getAttribute("data-max"));
  const status = getRepStatus(value, { min, max });
  // Reset classes
  inputEl.classList.remove("in-range", "out-low", "out-high");
  statusEl.classList.remove("empty", "in-range", "out-low", "out-high");
  if (status.cls !== "empty") inputEl.classList.add(status.cls);
  statusEl.classList.add(status.cls);
  statusEl.textContent = status.txt;
}

// Recalcula y actualiza el chip de kcal del ejercicio y el total de la sesion
function refreshExerciseKcal(exId) {
  // Buscar el ejercicio actual basado en el dayType y exId
  const dayType = getDayType(selectedDate);
  if (dayType === "rest") return;
  const blockInfo = getBlock(selectedDate);
  const blockData = blockInfo.block === "a" ? BLOQUE_A : BLOQUE_B;
  const dayData = blockData[dayType];
  if (!dayData) return;

  // Encontrar el ejercicio dentro de la estructura
  let foundEx = null;
  for (const group of dayData) {
    for (const ex of group.exercises) {
      const candidateId = `${dayType}-${dayData.indexOf(group)}-${group.exercises.indexOf(ex)}`;
      if (candidateId === exId) {
        foundEx = ex;
        break;
      }
    }
    if (foundEx) break;
  }
  if (!foundEx) return;

  const log = getLog(selectedDate, exId);
  const setRepsArr = [];
  for (let i = 0; i < foundEx.sets; i++) {
    setRepsArr.push((log.setReps && log.setReps[i] !== undefined) ? log.setReps[i] : "");
  }
  const kcalResult = calculateKcal(
    parseFloat(log.weight) || 0,
    setRepsArr,
    parseFloat(log.restSec) || 0,
    foundEx,
    profile
  );
  const kcalDisplay = (kcalResult && log.weight) ? kcalResult.total : null;

  // Actualizar el chip de kcal en la cabecera del ejercicio
  const card = document.querySelector(`.exercise-card[data-exid="${exId}"]`);
  if (card) {
    let chip = card.querySelector(".kcal-pill");
    const statsEl = card.querySelector(".exercise-stats");
    if (kcalDisplay) {
      if (!chip && statsEl) {
        chip = document.createElement("span");
        chip.className = "stat-pill kcal-pill";
        statsEl.appendChild(chip);
      }
      if (chip) chip.textContent = `${kcalDisplay} kcal`;
    } else if (chip) {
      chip.remove();
    }
  }

  // Actualizar bloque de resultado interno
  const resultBlock = document.querySelector(`.kcal-result[data-exid="${exId}"]`);
  const detailContainer = document.querySelector(`.exercise-detail[data-exid="${exId}"]`);
  const firstDetailSection = detailContainer ? detailContainer.querySelector(".detail-section") : null;
  if (kcalDisplay && kcalResult) {
    const detailHTML = `
      <div>
        <div class="kcal-result-label">Gasto estimado</div>
        <div style="font-family: 'Space Mono', monospace; font-size: 10px; color: var(--text-dim); margin-top: 2px;">
          ${kcalResult.actualSets} series, ${kcalResult.totalReps} reps totales &middot; descanso ${kcalResult.restSecUsed}s
        </div>
      </div>
      <div class="kcal-result-value">${kcalDisplay} <span style="font-size: 12px; color: var(--text-mid);">kcal</span></div>
    `;
    if (resultBlock) {
      resultBlock.innerHTML = detailHTML;
    } else if (firstDetailSection) {
      const newBlock = document.createElement("div");
      newBlock.className = "kcal-result";
      newBlock.setAttribute("data-exid", exId);
      newBlock.innerHTML = detailHTML;
      firstDetailSection.appendChild(newBlock);
    }
  } else if (resultBlock) {
    resultBlock.remove();
  }

  // Recalcular total de sesion
  refreshSessionTotal();
}

function refreshSessionTotal() {
  const dayType = getDayType(selectedDate);
  if (dayType === "rest") return;
  const blockInfo = getBlock(selectedDate);
  const blockData = blockInfo.block === "a" ? BLOQUE_A : BLOQUE_B;
  const dayData = blockData[dayType];
  if (!dayData) return;

  let total = 0;
  let count = 0;
  let totalEx = 0;
  dayData.forEach(group => {
    group.exercises.forEach(ex => {
      totalEx++;
      const exId = `${dayType}-${dayData.indexOf(group)}-${group.exercises.indexOf(ex)}`;
      const log = getLog(selectedDate, exId);
      const setRepsArr = [];
      for (let i = 0; i < ex.sets; i++) {
        setRepsArr.push((log.setReps && log.setReps[i] !== undefined) ? log.setReps[i] : "");
      }
      const r = calculateKcal(parseFloat(log.weight) || 0, setRepsArr, parseFloat(log.restSec) || 0, ex, profile);
      if (r && log.weight) { total += r.total; count++; }
    });
  });

  let summary = document.querySelector(".session-summary");
  const summaryHTML = `
    <div class="session-summary-header">
      <div class="session-summary-title">TOTAL SESION</div>
      <div class="session-summary-total">${total}<span class="unit">KCAL</span></div>
    </div>
    <div class="session-summary-detail">
      ${count} de ${totalEx} ejercicios registrados<br>
      Estimacion basada en trabajo mecanico + EPOC (eficiencia muscular 22%).<br>
      Margen de error real: aprox &plusmn;15-25%. Util como referencia comparativa entre sesiones.
    </div>
  `;

  if (total > 0) {
    if (summary) {
      // Actualizar contenido existente sin destruir el elemento
      summary.innerHTML = summaryHTML;
    } else {
      // Crear el bloque y agregarlo despues del ultimo muscle-group
      const newSummary = document.createElement("div");
      newSummary.className = "session-summary";
      newSummary.innerHTML = summaryHTML;
      // Buscar el contenedor app y el lugar adecuado: despues del ultimo .muscle-group, antes de .notes-section
      const notesSection = document.querySelector(".notes-section");
      if (notesSection && notesSection.parentNode) {
        notesSection.parentNode.insertBefore(newSummary, notesSection);
      } else {
        // Fallback: agregar al final del app
        const app = document.getElementById("app");
        if (app) app.appendChild(newSummary);
      }
    }
  } else if (summary) {
    summary.remove();
  }
}

function openProfile() {
  document.getElementById("profile-weight").value = profile.weight;
  document.getElementById("profile-height").value = profile.height;
  document.getElementById("profile-age").value = profile.age;
  document.getElementById("profile-startdate").value = profile.startDate || "2026-04-06";
  document.getElementById("profile-activity").value = profile.activityLevel || "moderate";
  document.getElementById("profile-modal").classList.add("open");
}

function closeProfile() {
  document.getElementById("profile-modal").classList.remove("open");
}

function saveProfile() {
  profile.weight = parseFloat(document.getElementById("profile-weight").value) || 85;
  profile.height = parseFloat(document.getElementById("profile-height").value) || 182;
  profile.age = parseFloat(document.getElementById("profile-age").value) || 25;
  profile.activityLevel = document.getElementById("profile-activity").value || "moderate";
  const sd = document.getElementById("profile-startdate").value;
  if (sd) profile.startDate = sd;
  // Al cambiar la fecha de inicio, limpiar override manual de bloque
  blockOverride = null;
  saveProfileToStorage();
  closeProfile();
  render();
}

render();
</script>
</body>
</html>
